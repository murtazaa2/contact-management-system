spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:contact_management}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:burhanuddin}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.keepalive-time=60000

# JWT Secret Key (set via environment variable in production)
jwt.secret=${JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}